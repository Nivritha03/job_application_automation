  - backend
  - software engineer
  - backend engineer
  - machine learning
  - frontend 
  - frontend engineer
  - developer
  - frontend developer
  - backend developer
  - ai engineer
  - data engineer
  - data scientist
  - full stack
  - mern stack  
  - django
  - flask
  - fastapi
  - intern

skip_keywords:
  - manager
  - director
  - principal
  - staff
  - sales
  - marketing
  - hr
  - legal

