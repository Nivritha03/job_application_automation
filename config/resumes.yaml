# =============================================================================
# Resume Selection Configuration
# =============================================================================
# The agent picks the resume whose keywords or skills overlap best with the job description.
# All filenames are relative to data/resumes/.
# If no keywords or skills match, the first entry is used as the default.
# =============================================================================

